name: Theme Check

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out theme
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for unresolved merge markers
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIn --exclude-dir=.git --exclude-dir=build -E '^(<<<<<<<|=======|>>>>>>>)' .; then
            echo 'Unresolved merge markers found.'
            exit 1
          fi

      - name: Lint PHP files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name '*.php' -not -path './vendor/*' -print0)

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find assets/js -type f -name '*.js' -print0)

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path('.').rglob('*.json'):
              if '.git' in path.parts or 'vendor' in path.parts or 'node_modules' in path.parts:
                  continue
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
              print(f'valid: {path}')
          PY

      - name: Check CSS structure and common typos
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          for path in Path('assets/css').rglob('*.css'):
              text = path.read_text(encoding='utf-8')
              if text.count('{') != text.count('}'):
                  raise SystemExit(f'Unbalanced CSS braces: {path}')
              if 'dis:flex' in text or 'dis:grid' in text:
                  raise SystemExit(f'Invalid display declaration: {path}')
              print(f'checked: {path}')
          PY

      - name: Check required theme files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            style.css
            readme.txt
            index.php
            functions.php
            header.php
            footer.php
            front-page.php
            page-recipes.php
            page-recipe-collections.php
            page-kitchen-notes.php
            page-my-story.php
            page-contact-me.php
            page-newsletter.php
            page-work-with-nigel.php
            page-editorial-standards.php
            page-affiliate-disclosure.php
            single.php
            search.php
            404.php
            theme.json
            inc/setup-wizard.php
            inc/site-health.php
            inc/discovery.php
            inc/growth.php
            inc/search.php
            assets/css/nkt-brand.css
            assets/css/recipe-experience.css
            assets/css/discovery-phase-4.css
            assets/css/site-phase-4.css
            assets/css/launch-phase-5.css
            assets/css/growth-phase-6.css
            assets/js/navigation.js
            assets/js/recipe-tools.js
            assets/js/growth-events.js
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Verify release version alignment
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n 's/^Version:[[:space:]]*//p' style.css | head -n1)
          stable=$(sed -n 's/^Stable tag:[[:space:]]*//p' readme.txt | head -n1)
          test -n "$version" || { echo 'Theme version missing.'; exit 1; }
          test "$version" = "$stable" || { echo "Version mismatch: style.css=$version readme.txt=$stable"; exit 1; }

      - name: Check evergreen recipe date presentation
        shell: bash
        run: |
          set -euo pipefail
          if grep -nE 'get_the_date|the_date|the_time' front-page.php single.php template-parts/content-card.php; then
            echo 'Visible recipe date output found in an evergreen recipe template.'
            exit 1
          fi

      - name: Build installable theme ZIP
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/nigels-kitchen-table
          rsync -a ./ build/nigels-kitchen-table/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='*.zip' \
            --exclude='.DS_Store'
          cd build
          zip -qr nigels-kitchen-table.zip nigels-kitchen-table
          unzip -tq nigels-kitchen-table.zip

      - name: Upload installable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: nigels-kitchen-table-theme
          path: build/nigels-kitchen-table.zip
          if-no-files-found: error
          retention-days: 14
