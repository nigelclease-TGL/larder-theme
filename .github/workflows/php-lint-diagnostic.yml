name: PHP Lint Diagnostic

on:
  pull_request:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out theme
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Create complete lint report
        shell: bash
        run: |
          set +e
          : > php-lint-report.txt
          while IFS= read -r -d '' file; do
            php -l "$file" >> php-lint-report.txt 2>&1
          done < <(find . -type f -name '*.php' -not -path './vendor/*' -print0)
          cat php-lint-report.txt
          exit 0

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        with:
          name: php-lint-report
          path: php-lint-report.txt
          retention-days: 1
